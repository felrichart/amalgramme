name = "amalgramme-community"
main = "worker.js"
compatibility_date = "2026-01-01"

# D1 database binding. Fill database_id after `wrangler d1 create amalgramme`.
[[d1_databases]]
binding = "DB"
database_name = "amalgramme"
database_id = "123b8926-0d14-4248-856f-d8f652330537"
migrations_dir = "migrations"

# Global submission rate limit. `period` may only be 10 or 60 seconds; this caps
# creations to 100 per 10s across all clients (the key is fixed in worker.js).
# Bump `limit` if you want it looser.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 10 }
