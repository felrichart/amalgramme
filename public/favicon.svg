<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Letter wheel coin: white disc, thick ink outline, hard offset ink shadow. -->
  <circle cx="53" cy="55" r="38" fill="#16181f"/>
  <circle cx="47" cy="48" r="38" fill="#ffffff" stroke="#16181f" stroke-width="4"/>
  <!-- Drawn path through the ring nodes. -->
  <polyline points="25,42 47,24 69,42 58,68 36,68"
    fill="none" stroke="#17b3a3" stroke-width="6"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Ring nodes. -->
  <g fill="#16181f">
    <circle cx="25" cy="42" r="7"/>
    <circle cx="47" cy="24" r="7"/>
    <circle cx="69" cy="42" r="7"/>
    <circle cx="58" cy="68" r="7"/>
    <circle cx="36" cy="68" r="7"/>
  </g>
</svg>
